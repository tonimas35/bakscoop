<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo -->
  <rect width="64" height="64" rx="8" fill="#fff"/>

  <!-- Tejado rojo -->
  <path d="M32 4 L54 20 L50 20 L32 8 L14 20 L10 20 Z" fill="#cc0000"/>
  <!-- Chimenea -->
  <rect x="40" y="6" width="5" height="10" rx="1" fill="#cc0000"/>

  <!-- Estructura metálica - Pilares verticales -->
  <rect x="18" y="20" width="4" height="40" rx="1.5" fill="#888"/>
  <rect x="42" y="20" width="4" height="40" rx="1.5" fill="#888"/>

  <!-- Barras horizontales rojas (las 3 del logo) -->
  <!-- Barra superior -->
  <rect x="14" y="24" width="36" height="5" rx="2.5" fill="#cc0000"/>
  <!-- Barra media -->
  <rect x="14" y="35" width="36" height="5" rx="2.5" fill="#cc0000"/>
  <!-- Barra inferior -->
  <rect x="14" y="46" width="36" height="5" rx="2.5" fill="#cc0000"/>

  <!-- Conectores curvos izquierda (simulando el entrelazado) -->
  <path d="M18 29 Q10 32 18 35" stroke="#888" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M18 40 Q10 43 18 46" stroke="#888" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Conectores curvos derecha -->
  <path d="M46 29 Q54 32 46 35" stroke="#888" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M46 40 Q54 43 46 46" stroke="#888" stroke-width="3.5" fill="none" stroke-linecap="round"/>
</svg>
